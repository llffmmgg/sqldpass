name: Sqldpass
options:
  bundleIdPrefix: com.sqldpass
  deploymentTarget:
    iOS: '17.0'
  developmentLanguage: ko
  generateEmptyDirectories: true
  createIntermediateGroups: true
  xcodeVersion: '15.4'

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: '5.0'
    ALWAYS_SEARCH_USER_PATHS: NO
    DEVELOPMENT_TEAM: ''
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES

packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 8.0.0
  SVGKit:
    url: https://github.com/SVGKit/SVGKit
    branch: "3.x"

targets:
  Sqldpass:
    type: application
    platform: iOS
    deploymentTarget: '17.0'
    sources:
      - path: Sqldpass
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
      - package: SVGKit
        product: SVGKit
    info:
      path: Sqldpass/Info.plist
      properties:
        CFBundleDisplayName: 문어CBT
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - com.googleusercontent.apps.1026495161962-jtgphtjb90025fsmvb8e13tpnokv3edp
        GIDClientID: 1026495161962-jtgphtjb90025fsmvb8e13tpnokv3edp.apps.googleusercontent.com
    settings:
      base:
        PRODUCT_NAME: Sqldpass
        PRODUCT_BUNDLE_IDENTIFIER: com.sqldpass.app
        ENABLE_PREVIEWS: YES
        MARKETING_VERSION: '1.0.0'
        CURRENT_PROJECT_VERSION: '1'
        TARGETED_DEVICE_FAMILY: '1'
