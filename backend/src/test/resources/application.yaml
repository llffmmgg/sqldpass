spring:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create
  ai:
    chat:
      client:
        enabled: false
    anthropic:
      api-key: test-key
      enabled: false
    google:
      genai:
        api-key: test-key
        enabled: false
    openai:
      api-key: test-key
      enabled: false

sqldpass:
  oauth:
    google:
      client-id: test-client-id
      client-secret: test-client-secret
  admin:
    username: admin
    password-hash: $2a$10$zKXKfuTgKRvDGo2F00OyTe2R33XqdfRBxSaqf1VG1oc6Wdtsy.xPO
  jwt:
    secret: test-secret-key-minimum-32-characters-long-for-hmac
    expiration: 3600000
  ai:
    generator:
      provider: claude
    verifier:
      provider: gemini
    generation:
      questions-per-subject: 1
      verification-enabled: false
      max-calls-per-run: 5
  scheduler:
    generation-cron: "0 0 3 * * *"
    enabled: false
