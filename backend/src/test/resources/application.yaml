spring:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create
  ai:
    chat:
      client:
        enabled: false
    anthropic:
      api-key: test-key
      enabled: false
    google:
      genai:
        api-key: test-key
        enabled: false
    openai:
      api-key: test-key
      enabled: false

sqldpass:
  ai:
    generator:
      provider: claude
    verifier:
      provider: gemini
    generation:
      questions-per-subject: 1
      verification-enabled: false
      max-calls-per-run: 5
  scheduler:
    generation-cron: "0 0 3 * * *"
    enabled: false
