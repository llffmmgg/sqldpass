spring:
  application:
    name: sqldpass
  profiles:
    default: local
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
    defer-datasource-initialization: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  ai:
    chat:
      client:
        enabled: false
    retry:
      max-attempts: 1
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:not-set}
      chat:
        options:
          model: claude-sonnet-4-20250514
          max-tokens: 4096
    google:
      genai:
        api-key: ${GOOGLE_GENAI_API_KEY:not-set}
        chat:
          options:
            model: gemini-2.5-flash-lite
    openai:
      api-key: ${OPENAI_API_KEY:not-set}
      chat:
        options:
          model: gpt-4o

sqldpass:
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:admin1234}
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-key-minimum-32-characters-long}
    expiration: 3600000
  ai:
    generator:
      provider: claude
    verifier:
      provider: gemini
    generation:
      questions-per-subject: 3
      verification-enabled: false
      max-calls-per-run: 50
  scheduler:
    generation-cron: "0 0 3 * * *"
    enabled: false
