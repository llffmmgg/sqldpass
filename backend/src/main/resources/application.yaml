spring:
  application:
    name: sqldpass
  profiles:
    default: local
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
    defer-datasource-initialization: false
  flyway:
    enabled: true
    baseline-on-migrate: true
