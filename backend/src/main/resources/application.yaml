spring:
  application:
    name: sqldpass
  profiles:
    default: local
  jackson:
    # Instant/OffsetDateTime 직렬화 시 KR offset 명시 — JVM TZ(Asia/Seoul)와 일관.
    time-zone: Asia/Seoul
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        # 1초 이상 걸린 쿼리는 WARN 로그로 출력 → Promtail이 수집 → Loki에서 검색 가능
        session:
          events:
            log:
              LOG_QUERIES_SLOWER_THAN_MS: 1000
    open-in-view: false
    defer-datasource-initialization: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    # 부팅 시 repair() → migrate() 는 FlywayConfig.repairThenMigrate() 빈에서 처리
  ai:
    chat:
      client:
        enabled: false
    retry:
      max-attempts: 1
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:not-set}
      chat:
        options:
          model: claude-sonnet-4-20250514
          # 8192 = Claude Sonnet 4 출력 토큰 한도. 모의고사 한 카테고리 needed가 큰 경우(SQLD 14개, 컴활 10개)
          # 출력 잘림 방지. 그 이상 needed가 필요하면 분할 호출 구현 필요.
          max-tokens: 8192
          # 정처기 모의고사 다양성 확보를 위해 결정성을 낮춤
          temperature: 0.9
          top-p: 0.95
    google:
      genai:
        api-key: ${GOOGLE_GENAI_API_KEY:not-set}
        chat:
          options:
            model: gemini-2.5-flash-lite
    openai:
      api-key: ${OPENAI_API_KEY:not-set}
      chat:
        options:
          model: gpt-4o

sqldpass:
  oauth:
    google:
      client-id: ${GOOGLE_OAUTH_CLIENT_ID:not-set}
      client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:not-set}
      # 네이티브 Android 앱이 Google Sign-In 으로 받는 ID 토큰의 audience.
      # Google Cloud Console 에서 Android 클라이언트 (package name + SHA-1) 를 따로 발급해 입력.
      android-client-id: ${GOOGLE_OAUTH_ANDROID_CLIENT_ID:}
      # iOS 네이티브 Google Sign-In SDK 가 발급하는 ID 토큰의 audience.
      # Google Cloud Console 에서 iOS 클라이언트 (Bundle ID: com.sqldpass.app) 를 따로 발급해 입력.
      # Default 값은 public OAuth Client ID — secret 아님(Bundle ID 와 함께 검증). env 로 override 가능.
      ios-client-id: ${GOOGLE_OAUTH_IOS_CLIENT_ID:1026495161962-jtgphtjb90025fsmvb8e13tpnokv3edp.apps.googleusercontent.com}
  play-billing:
    # 앱 ID — native Android applicationId 와 동일해야 한다.
    package-name: ${PLAY_BILLING_PACKAGE_NAME:com.sqldpass.app}
    # Play Console > 설정 > API 액세스에서 발급한 서비스 계정 JSON 키 경로.
    # 운영 배포 시 컨테이너에 마운트하고 환경변수로 절대경로 주입.
    service-account-json-path: ${PLAY_BILLING_SA_PATH:}
    # RTDN webhook URL 에 ?token=... 로 붙는 shared secret (MVP 보안). 미설정 시 검증 스킵.
    rtdn-shared-secret: ${PLAY_BILLING_RTDN_SECRET:}
    # Pub/Sub push subscription 의 OIDC ID token audience.
    # 운영자가 Pub/Sub 등록 시 입력한 audience (보통 endpoint URL) 와 동일해야 함.
    # 미설정 시 OIDC 검증 비활성 → shared-secret fallback.
    rtdn-oidc-audience: ${PLAY_BILLING_RTDN_AUDIENCE:}
    # Play Console 에 등록한 일회성 상품(SKU) 매핑 — 클라이언트가 보낸 productId 검증에 사용.
    product-id-mapping:
      THREE_DAY: ${PLAY_BILLING_SKU_THREE_DAY:iap_thunder}
      FOCUS: ${PLAY_BILLING_SKU_FOCUS:iap_focus}
      ONE_MONTH: ${PLAY_BILLING_SKU_ONE_MONTH:iap_one_month}
      UNLIMITED: ${PLAY_BILLING_SKU_UNLIMITED:iap_unlimited}
  admin:
    username: ${ADMIN_USERNAME:admin}
    password-hash: ${ADMIN_PASSWORD_HASH:$2a$10$zKXKfuTgKRvDGo2F00OyTe2R33XqdfRBxSaqf1VG1oc6Wdtsy.xPO}
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-key-minimum-32-characters-long}
    expiration: 604800000
  ai:
    generator:
      provider: claude
    verifier:
      provider: claude
    generation:
      questions-per-subject: 3
      verification-enabled: false
      max-calls-per-run: 50
  scheduler:
    generation-cron: "0 0 3 * * *"
    enabled: false
  discord:
    webhook:
      generation: ${DISCORD_WEBHOOK_GENERATION:}
      signup: ${DISCORD_WEBHOOK_SIGNUP:}
      error: ${DISCORD_WEBHOOK_ERROR:}
      feedback: ${DISCORD_WEBHOOK_FEEDBACK:}
      payment: ${DISCORD_WEBHOOK_PAYMENT:}
  r2:
    # Cloudflare R2 — 게시판 이미지 업로드용 (presigned PUT URL 발급).
    # 미설정이면 /api/uploads/image-url 이 503 반환.
    endpoint: ${R2_ENDPOINT:}                    # 예: https://<account-id>.r2.cloudflarestorage.com
    bucket: ${R2_BUCKET:}                        # 예: sqldpass-uploads
    access-key: ${R2_ACCESS_KEY:}
    secret-key: ${R2_SECRET_KEY:}
    public-base-url: ${R2_PUBLIC_BASE_URL:}      # 예: https://pub-xxx.r2.dev/{bucket}  (path-style 이면 bucket 까지 포함)
    max-bytes: ${R2_MAX_BYTES:5242880}           # 5 MB
  payment:
    # PortOne V2 가맹점 자격증.
    # store-id: store-{uuid} 형태. PortOne 어드민 → 상점 → Store ID
    # api-secret: V2 API 시크릿. 결제 검증·취소 호출에 사용. PortOne 어드민 → 결제 연동 → API V2 시크릿 발급
    portone:
      store-id: ${PORTONE_STORE_ID:}
      api-secret: ${PORTONE_API_SECRET:}
      api-base-url: ${PORTONE_API_BASE_URL:https://api.portone.io}
    # 화이트리스트 닉네임 — 본 목록에 포함된 회원은 가상 UNLIMITED 구독 자동 부여
    # (PREMIUM 풀이 + 광고 제거 + PDF 다운로드 모두 해금). 카드사 심사용 운영자 검토 흐름.
    # 정식 오픈 후 비워도 결제 흐름 자체는 정상 동작.
    reviewer-nicknames: ${PAYMENT_REVIEWER_NICKNAMES:}
    # 4티어 구독 모델 — 각 plan 의 결제 금액(원)·상품명. TEST/0원 금지 (카드사 심사).
    three-day:
      amount: ${PAYMENT_3DAY_AMOUNT:3900}
      product-name: ${PAYMENT_3DAY_NAME:문어CBT Thunder}
    focus:
      amount: ${PAYMENT_FOCUS_AMOUNT:2900}
      product-name: ${PAYMENT_FOCUS_NAME:문어CBT Focus}
    one-month:
      amount: ${PAYMENT_1MONTH_AMOUNT:9900}
      product-name: ${PAYMENT_1MONTH_NAME:문어CBT Pro}
    unlimited:
      amount: ${PAYMENT_UNLIMITED_AMOUNT:29900}
      product-name: ${PAYMENT_UNLIMITED_NAME:문어CBT All Pass}
    app-store:
      # 앱 Bundle ID — iOS native 와 동일해야 한다.
      # Apple StoreKit signedTransaction payload 의 bundleId 검증에 사용.
      bundle-id: ${APP_STORE_BUNDLE_ID:com.sqldpass.app}
    # 4티어 + iOS 인앱 결제 SKU 매핑 (App Store Connect 등록 후 확정).
    app-store-product-id-mapping:
      THREE_DAY: ${APP_STORE_SKU_THREE_DAY:iap_thunder}
      FOCUS: ${APP_STORE_SKU_FOCUS:iap_focus}
      ONE_MONTH: ${APP_STORE_SKU_ONE_MONTH:iap_one_month}
      UNLIMITED: ${APP_STORE_SKU_UNLIMITED:iap_unlimited}
  pdf:
    # 모의고사 PDF 생성기 — Playwright 헤드리스 Chromium 으로 인쇄 페이지를 PDF 화.
    # print-page-base-url: 백엔드(Playwright) 가 호출할 프론트 인쇄 페이지 베이스 URL.
    #   로컬: http://localhost:3000  /  운영: https://sqldpass.com
    # 인쇄 페이지는 같은 origin 의 /api/* 를 호출 → nginx/Next.js rewrites 가 백엔드로 프록시.
    print-page-base-url: ${PDF_PRINT_PAGE_BASE_URL:http://localhost:3000}
    # PDF 캐시(R2 객체) 키 prefix.
    cache-key-prefix: ${PDF_CACHE_KEY_PREFIX:pdf/mock-exams}
    # true 면 서버 시작 시 Chromium 을 실제로 띄워봐서 런타임 장애를 startup 단계로 당긴다.
    verify-on-startup: ${PDF_VERIFY_ON_STARTUP:false}

# Apple App Store Server Notifications V2 — JWS 검증용 설정.
# bundle-id: iOS native 앱 Bundle ID (`com.sqldpass.app`).
# app-apple-id: App Store Connect numeric app id. PRODUCTION 환경에서 필수 — 미설정(0) 시 경고만 로그.
# environment: SANDBOX | PRODUCTION | XCODE | LOCAL_TESTING. 운영은 PRODUCTION.
app-store:
  bundle-id: ${APP_STORE_BUNDLE_ID:com.sqldpass.app}
  app-apple-id: ${APP_STORE_APP_APPLE_ID:0}
  environment: ${APP_STORE_ENVIRONMENT:SANDBOX}
