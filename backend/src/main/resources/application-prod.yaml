server:
  shutdown: graceful

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    properties:
      hibernate:
        format_sql: false
  lifecycle:
    timeout-per-shutdown-phase: 20s

# Actuator: 헬스체크 엔드포인트만 노출 (보안)
# /actuator/health — 배포 후 정상 기동 확인에 사용
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
