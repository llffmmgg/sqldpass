# ============================================================
# 공통 server-level 설정 — HTTPS server {} 블록 내부에서 include
# ============================================================
# 여러 도메인(api, stg, www) HTTPS 블록이 공유할 규칙을 한 곳에 모음.
#
# 사용법 (nginx.conf 안에서):
#   server {
#       listen 443 ssl;
#       server_name api.sqldpass.com;
#       ssl_certificate ...;
#       include /etc/nginx/includes/nginx-common.conf;
#       location / { ... }
#   }
#
# docker-compose.yml 볼륨 마운트 경로:
#   ./nginx-common.conf:/etc/nginx/includes/nginx-common.conf:ro
# (/etc/nginx/conf.d/ 에 두면 nginx가 자동 include해서 top-level로 오염됨 → includes/ 사용)
# ============================================================

# --- 보안 헤더 ---
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;

# --- 업로드 본문 크기 제한 ---
client_max_body_size 10M;

# --- 악성 User-Agent 차단 (응답 없이 연결 종료) ---
if ($http_user_agent ~* (l9scan|leakix|nmap|masscan|sqlmap|nikto|dirbuster|gobuster|wpscan|zgrab|nuclei|censys|shodan)) {
    return 444;
}

# --- 기본 robots.txt — 모든 봇 인덱싱 금지 (서비스 도메인에선 개별 server에서 override) ---
location = /robots.txt {
    add_header Content-Type text/plain;
    return 200 "User-agent: *\nDisallow: /\n";
}

# --- 알려진 공격 경로 차단 ---
location ~* \.(env|git|svn|htaccess|DS_Store|aws|sql|bak|backup)$ { return 444; }
location ~* /(wp-admin|wp-login|wp-content|wp-includes|phpmyadmin|telescope) { return 444; }
location ~* /(adminer|administrator|setup\.php|info\.php|phpinfo|xmlrpc) { return 444; }
location ~* /\.(git|svn|env|aws) { return 444; }
