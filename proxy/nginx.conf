# ============================================================
# nginx 운영 설정 (HTTPS + 리버스 프록시)
# ============================================================
# 라우팅:
#   api.sqldpass.com → ARM 백엔드(10.0.0.72:8080) — Spring Boot
#   stg.sqldpass.com → ARM 프론트(10.0.0.72:3000) — Next.js (API 경로는 :8080)
#   www.sqldpass.com → (Stage 6에서 활성화 예정, stg와 동일 구조)
#
# 공통 규칙(보안 헤더, 봇 차단 등)은 /etc/nginx/includes/nginx-common.conf
# 로 분리 — include 로 재사용.
#
# ▼▼▼ stg HTTPS 블록 활성화 절차 (Phase B) ▼▼▼
#   1. 이 파일과 nginx-common.conf, docker-compose.yml을 proxy 인스턴스에 복사
#   2. docker compose up -d   # nginx-common.conf 볼륨 마운트 반영
#   3. docker compose restart nginx  # api + stg HTTP 블록 활성화
#   4. SSL 인증서 발급:
#        docker compose run --rm certbot certonly --webroot \
#          -w /var/www/certbot -d stg.sqldpass.com
#   5. 아래 "stg.sqldpass.com HTTPS" 블록의 주석을 해제
#   6. docker compose restart nginx
#   7. curl -sI https://stg.sqldpass.com/ 로 200 확인
# ============================================================


# ============================================================
# api.sqldpass.com
# ============================================================

# HTTP — HTTPS 리다이렉트 + certbot 갱신용
server {
    listen 80;
    server_name api.sqldpass.com;

    # certbot 인증서 갱신 시 사용 (HTTP-01 챌린지)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — 백엔드 리버스 프록시
server {
    listen 443 ssl;
    http2 on;
    server_name api.sqldpass.com;

    ssl_certificate /etc/letsencrypt/live/api.sqldpass.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.sqldpass.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 보안 헤더 + 봇 차단 + 공격 경로 차단 (공통)
    include /etc/nginx/includes/nginx-common.conf;

    # 백엔드 프록시 (VCN 내부 IP)
    location / {
        proxy_pass http://10.0.0.72:8080;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # AI 문제 생성 등 긴 요청 대비
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}


# ============================================================
# stg.sqldpass.com — 프론트 staging
# ============================================================

# HTTP — 인증서 챌린지 + HTTPS 리다이렉트
# (HTTPS 블록이 아직 없는 Phase A에서도 이 블록은 활성. certbot 발급 필수 경로)
server {
    listen 80;
    server_name stg.sqldpass.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

