# ============================================================
# nginx 운영 설정 (HTTPS + 리버스 프록시)
# ============================================================
# api.sqldpass.com → ARM 인스턴스(10.0.0.72:8080)로 프록시
# - HTTP 요청은 HTTPS로 리다이렉트
# - Let's Encrypt 인증서로 HTTPS 제공
# - 백엔드는 VCN 내부 IP로만 접근 (외부 차단)
# ============================================================

# ----------------------------------------------------------
# HTTP — HTTPS 리다이렉트 + certbot 갱신용
# ----------------------------------------------------------
server {
    listen 80;
    server_name api.sqldpass.com;

    # certbot 인증서 갱신 시 사용 (HTTP-01 챌린지)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 나머지는 모두 HTTPS로 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

# ----------------------------------------------------------
# HTTPS — 메인 리버스 프록시
# ----------------------------------------------------------
server {
    listen 443 ssl;
    http2 on;
    server_name api.sqldpass.com;

    # Let's Encrypt 인증서
    ssl_certificate /etc/letsencrypt/live/api.sqldpass.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.sqldpass.com/privkey.pem;

    # SSL 보안 설정 (Mozilla Intermediate 권장)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 보안 헤더
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # 요청 본문 크기 제한 (필요 시 조정)
    client_max_body_size 10M;

    # 백엔드 ARM 인스턴스로 프록시 (VCN 내부 IP)
    location / {
        proxy_pass http://10.0.0.72:8080;

        # 백엔드에 원본 요청 정보 전달
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 타임아웃 설정 (AI 문제 생성 등 긴 요청 대비)
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
