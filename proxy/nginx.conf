# ============================================================
# nginx 운영 설정 (HTTPS + 리버스 프록시)
# ============================================================
# 라우팅:
#   api.sqldpass.com → ARM 백엔드(10.0.0.72:8080) — Spring Boot
#   www.sqldpass.com → ARM 프론트(10.0.0.72:3000) — Next.js (API 경로는 :8080)
#
# staging 환경:
#   stg.sqldpass.com 은 Vercel이 담당 (OCI nginx 관리 대상 아님).
#   DNS CNAME cname.vercel-dns.com 으로 Vercel 배포 연결.
#
# 공통 규칙(보안 헤더, 봇 차단 등)은 /etc/nginx/includes/nginx-common.conf
# 로 분리 — include 로 재사용.
#
# ▼▼▼ www HTTPS 블록 활성화 절차 ▼▼▼
#   1. (proxy 인스턴스 SSH) DNS 챌린지로 인증서 발급:
#        cd ~/proxy
#        docker compose run --rm certbot certonly --manual \
#          --preferred-challenges dns -d www.sqldpass.com
#      → 표시된 TXT 레코드를 DNS 제공자에 추가, 전파 확인 후 엔터
#   2. 아래 "www.sqldpass.com HTTPS" 블록의 주석을 해제
#   3. 커밋·push → proxy-cd가 자동 반영
#   4. proxy 인스턴스에서 사전 검증:
#        curl -kH "Host: www.sqldpass.com" -sI https://localhost/
#   5. www.sqldpass.com A 레코드를 Vercel → OCI proxy IP 로 변경
#   6. TTL 전파 후 https://www.sqldpass.com/ 200 확인
# ============================================================


# ============================================================
# api.sqldpass.com
# ============================================================

# HTTP — HTTPS 리다이렉트 + certbot 갱신용
server {
    listen 80;
    server_name api.sqldpass.com;

    # certbot 인증서 갱신 시 사용 (HTTP-01 챌린지)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — 백엔드 리버스 프록시
server {
    listen 443 ssl;
    http2 on;
    server_name api.sqldpass.com;

    ssl_certificate /etc/letsencrypt/live/api.sqldpass.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.sqldpass.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 보안 헤더 + 봇 차단 + 공격 경로 차단 (공통)
    include /etc/nginx/includes/nginx-common.conf;

    # 백엔드 프록시 (VCN 내부 IP)
    location / {
        proxy_pass http://10.0.0.72:8080;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # AI 문제 생성 등 긴 요청 대비
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}


# ============================================================
# www.sqldpass.com — 프론트 프로덕션
# ============================================================

# HTTP — 인증서 갱신 + HTTPS 리다이렉트
server {
    listen 80;
    server_name www.sqldpass.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Next.js + 백엔드 이중 프록시
server {
    listen 443 ssl;
    http2 on;
    server_name www.sqldpass.com;

    ssl_certificate /etc/letsencrypt/live/www.sqldpass.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.sqldpass.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 보안 헤더 + 봇 차단 + 공격 경로 차단 (공통)
    include /etc/nginx/includes/nginx-common.conf;

    # /api/* → 백엔드 (브라우저의 상대경로 호출 처리)
    location /api/ {
        proxy_pass http://10.0.0.72:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # 그 외 → Next.js (SSR/정적 산출물 모두)
    location / {
        proxy_pass http://10.0.0.72:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Next.js Server Actions / streaming 대응
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
