# ============================================================
# nginx 리버스 프록시 (E2.1.Micro 인스턴스용)
# ============================================================
# 위치: ~/proxy/ 디렉토리
#
# 사용법:
#   1. nginx-init.conf를 nginx.conf로 복사 (인증서 발급 전 임시)
#   2. docker compose up -d nginx
#   3. certbot으로 인증서 발급
#   4. 진짜 nginx.conf로 교체 후 docker compose restart nginx
# ============================================================

services:
  # ----------------------------------------------------------
  # nginx — 리버스 프록시 + SSL termination
  # ----------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # nginx 설정 파일
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Let's Encrypt 인증서 (certbot이 작성, nginx가 읽기)
      - ./certbot/conf:/etc/letsencrypt:ro
      # ACME 챌린지 webroot (certbot이 작성, nginx가 읽기)
      - ./certbot/www:/var/www/certbot:ro

  # ----------------------------------------------------------
  # certbot — Let's Encrypt 인증서 자동 갱신
  # 12시간마다 renew 시도 (만료 30일 전부터 자동 갱신됨)
  # ----------------------------------------------------------
  certbot:
    image: certbot/certbot
    container_name: certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
