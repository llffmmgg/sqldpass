# ============================================================
# nginx 초기 설정 (인증서 발급 전용, 1회성)
# ============================================================
# Let's Encrypt 인증서를 처음 발급받기 전 단계에서 사용.
# HTTP만 띄워두고 certbot의 ACME challenge 요청을 받는다.
# 인증서 발급 후 nginx.conf로 교체.
# ============================================================

server {
    listen 80;
    server_name api.sqldpass.com;

    # certbot 인증 챌린지 경로
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 그 외 요청은 임시로 200 응답
    location / {
        return 200 'nginx is running\n';
        add_header Content-Type text/plain;
    }
}
