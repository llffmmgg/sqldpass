# ============================================================
# sqldpass 운영 배포용 Docker Compose
# ============================================================
#
# 사용법:
#   docker compose -f docker-compose.prod.yaml up -d
#
# 필수 조건:
#   - 같은 디렉토리에 .env 파일 존재 (.env.example 참고)
#   - ghcr.io 로그인 완료 (docker login ghcr.io)
#
# 구성:
#   app — Spring Boot 백엔드 (ghcr.io에서 pull)
#   db  — MySQL 8.0 (내부 네트워크만, 외부 접근 불가)
#   web — Next.js 프론트엔드 (ghcr.io에서 pull)
# ============================================================

services:
  # ----------------------------------------------------------
  # 백엔드 애플리케이션
  # ----------------------------------------------------------
  app:
    image: ghcr.io/llffmmgg/sqldpass:prod
    container_name: sqldpass-app
    restart: unless-stopped   # 서버 재부팅 시 자동 재시작 (수동 stop 제외)
    stop_grace_period: 30s    # graceful shutdown — Spring Boot가 인플라이트 요청 마무리할 시간 확보
    ports:
      - "${APP_PORT:-8080}:8080"   # 호스트 포트 변경 가능 (기본값 8080)
    environment:
      # --- Spring 프로필 ---
      SPRING_PROFILES_ACTIVE: prod

      # --- 데이터베이스 접속 정보 ---
      # 'db'는 같은 Docker 네트워크 내 MySQL 서비스의 호스트명
      DB_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}

      # --- 인증 ---
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}

      # --- 결제 / PortOne ---
      PORTONE_STORE_ID: ${PORTONE_STORE_ID}
      PORTONE_API_SECRET: ${PORTONE_API_SECRET}
      PORTONE_API_BASE_URL: ${PORTONE_API_BASE_URL:-https://api.portone.io}
      # 화이트리스트 닉네임 (콤마 구분) — 결제 페이지 가시성용. 정식 오픈 시 비움.
      PAYMENT_REVIEWER_NICKNAMES: ${PAYMENT_REVIEWER_NICKNAMES:-}
      # 구독 가격·상품명 — 운영 시 .env 로 조정 가능. 기본값 그대로면 .env 에 안 둬도 됨.
      PAYMENT_3DAY_AMOUNT: ${PAYMENT_3DAY_AMOUNT:-3900}
      PAYMENT_3DAY_NAME: ${PAYMENT_3DAY_NAME:-문어CBT Thunder}
      PAYMENT_FOCUS_AMOUNT: ${PAYMENT_FOCUS_AMOUNT:-2900}
      PAYMENT_FOCUS_NAME: ${PAYMENT_FOCUS_NAME:-문어CBT Focus}
      PAYMENT_1MONTH_AMOUNT: ${PAYMENT_1MONTH_AMOUNT:-9900}
      PAYMENT_1MONTH_NAME: ${PAYMENT_1MONTH_NAME:-문어CBT Pro}
      PAYMENT_UNLIMITED_AMOUNT: ${PAYMENT_UNLIMITED_AMOUNT:-29900}
      PAYMENT_UNLIMITED_NAME: ${PAYMENT_UNLIMITED_NAME:-문어CBT All Pass}

      # --- App Store Server Notifications v2 검증 ---
      # ASSN v2 JWS 서명·체인·bundleId 검증에 사용. AppStorePayloadVerifier 가 읽음.
      APP_STORE_BUNDLE_ID: ${APP_STORE_BUNDLE_ID:-com.sqldpass.app}
      # App Store Connect → App Information → Apple ID 의 숫자값.
      # PRODUCTION 환경에서 0/공란이면 startup 시 fail-fast.
      APP_STORE_APP_APPLE_ID: ${APP_STORE_APP_APPLE_ID:-0}
      # SANDBOX | PRODUCTION — TestFlight·sandbox 영수증을 받는 동안엔 SANDBOX, 정식 배포 후 PRODUCTION.
      APP_STORE_ENVIRONMENT: ${APP_STORE_ENVIRONMENT:-PRODUCTION}

      # --- 관리자 ---
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}

      # --- AI API 키 ---
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GOOGLE_GENAI_API_KEY: ${GOOGLE_GENAI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}

      # --- Discord 웹훅 ---
      DISCORD_WEBHOOK_GENERATION: ${DISCORD_WEBHOOK_GENERATION}
      DISCORD_WEBHOOK_SIGNUP: ${DISCORD_WEBHOOK_SIGNUP}
      DISCORD_WEBHOOK_ERROR: ${DISCORD_WEBHOOK_ERROR}
      DISCORD_WEBHOOK_FEEDBACK: ${DISCORD_WEBHOOK_FEEDBACK}

      # --- Cloudflare R2 (게시판 이미지 업로드 + 모의고사 PDF 캐시) ---
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_BUCKET: ${R2_BUCKET}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY}
      R2_SECRET_KEY: ${R2_SECRET_KEY}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL}

      # --- 모의고사 PDF 생성 (Playwright) ---
      # 백엔드 컨테이너의 Chromium 이 호출할 프론트 인쇄 페이지 베이스 URL.
      # nginx 경유 외부 URL — web 컨테이너 swap/재시작·docker DNS 캐시와 무관하게 안정적.
      # admin-only 가끔 호출이라 외부 트래픽 한 번 더 발생해도 비용 무시 가능.
      PDF_PRINT_PAGE_BASE_URL: https://www.sqldpass.com
    depends_on:
      db:
        condition: service_healthy   # DB healthcheck 통과 후 앱 시작
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 2G   # Spring AI(~1G) + Playwright Chromium 피크(~500MB)
          # 변경 이력: 1G → 2G — PDF 생성 시 Chromium 부담

  # ----------------------------------------------------------
  # MySQL 데이터베이스
  # ----------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: sqldpass-db
    restart: unless-stopped
    # ⚠️ ports 미설정 — 호스트에서 직접 접근 불가 (보안)
    # 앱 컨테이너만 내부 네트워크(backend-net)를 통해 접근 가능
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}          # 자동 생성될 데이터베이스명
      MYSQL_USER: ${MYSQL_USER}                  # 앱 전용 사용자 (root 아님)
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}          # 앱 전용 비밀번호
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}  # root 비밀번호 (관리용)
      TZ: Asia/Seoul
    volumes:
      - mysql-prod-data:/var/lib/mysql   # 컨테이너 재생성해도 데이터 유지
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      # MySQL이 완전히 기동되었는지 확인 (앱 시작 전 대기에 사용)
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s      # 10초마다 체크
      timeout: 5s         # 5초 내 응답 없으면 실패
      retries: 5          # 5회 연속 실패 시 unhealthy
      start_period: 30s   # 최초 30초는 실패해도 무시 (기동 시간 확보)
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 512M

  # ----------------------------------------------------------
  # Next.js 프론트엔드
  # - nginx 인스턴스(별도)에서 3000 포트로 프록시
  # - SSR/ISR은 compose 내부 네트워크로 'app:8080' 직통 (nginx 우회)
  # - 외부 노출은 nginx 쪽에서만 — OCI VCN security list에서 3000은 내부만 허용
  # ----------------------------------------------------------
  web:
    image: ghcr.io/llffmmgg/sqldpass-web:prod
    container_name: sqldpass-web
    restart: unless-stopped
    stop_grace_period: 10s   # Next.js는 graceful shutdown 짧음
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      # --- API 라우팅 ---
      # SSR/ISR 호출용 — Docker 내부 DNS로 백엔드 컨테이너에 직접 접근
      INTERNAL_API_URL: http://app:8080
      # 브라우저에서는 relative path(/api/*)를 쓰도록 빈 문자열
      # → nginx가 /api/*를 백엔드로 라우팅
      NEXT_PUBLIC_API_URL: ""
    depends_on:
      app:
        condition: service_started   # backend가 뜬 뒤 web 시작 (SSR 시 첫 호출 실패 방지)
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 700M   # Next.js 16 standalone 런타임 (idle ~200MB, peak ~500MB)

# ----------------------------------------------------------
# 네트워크: app ↔ db ↔ web 간 격리된 내부 통신
# ----------------------------------------------------------
networks:
  backend-net:
    driver: bridge

# ----------------------------------------------------------
# 볼륨: MySQL 데이터 영속 저장
# 컨테이너를 삭제해도 데이터는 유지됨
# 완전 삭제: docker volume rm sqldpass_mysql-prod-data
# ----------------------------------------------------------
volumes:
  mysql-prod-data:
