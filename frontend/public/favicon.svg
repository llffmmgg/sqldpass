<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <linearGradient id="s" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Rounded square bg -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Border glow -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="6.5" fill="none" stroke="#f59e0b" stroke-opacity="0.2" stroke-width="1"/>
  <!-- S letterform -->
  <text x="7" y="24" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="24" fill="url(#s)">S</text>
  <!-- Checkmark overlay -->
  <polyline points="18,17 22,22 28,10" fill="none" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
