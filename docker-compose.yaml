services:
  mysql:
    image: mysql:8.0
    container_name: sqldpass-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: sqldpass
      MYSQL_ROOT_PASSWORD: sqldpass
      TZ: Asia/Seoul
    volumes:
      - mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  mysql-data:
