  <text x="380" y="512" font-size="9" fill="#639922">SSH deploy</text>

  <!-- Arrow: ghcr → Backend -->
  <path d="M550 397 L500 397 L500 460 L480 460" fill="none" stroke="#D4537E" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#a)"/>
  <text x="502" y="435" font-size="9" fill="#D4537E">docker pull</text>

