  <rect x="60" y="540" width="420" height="90" rx="12" fill="#FEF0EB" stroke="#F0997B" stroke-width="1"/>
  <text x="76" y="558" font-size="10" font-weight="600" fill="#993C1D" letter-spacing="0.5">OCI — E2.1.MICRO #2 (관측)</text>

  <rect x="80" y="568" width="110" height="44" rx="6" fill="#fff" stroke="#F5C4B3" stroke-width="0.8"/>
  <text x="100" y="595" font-size="12" font-weight="600" fill="#712B13">📊 Loki</text>

  <rect x="210" y="568" width="110" height="44" rx="6" fill="#fff" stroke="#F5C4B3" stroke-width="0.8"/>
  <text x="226" y="595" font-size="12" font-weight="600" fill="#712B13">📈 Grafana</text>

  <rect x="340" y="568" width="110" height="44" rx="6" fill="#fff" stroke="#F5C4B3" stroke-width="0.8"/>
  <text x="365" y="595" font-size="12" font-weight="600" fill="#712B13">⚡ nginx</text>

