  <rect x="550" y="282" width="270" height="38" rx="6" fill="#fff" stroke="#F4C0D1" stroke-width="0.8"/>
  <text x="572" y="306" font-size="12" font-weight="600" fill="#72243E">🤖 Spring AI</text>
  <text x="672" y="306" font-size="10" fill="#993556">Anthropic / Gemini / OpenAI</text>

  <rect x="550" y="330" width="270" height="38" rx="6" fill="#fff" stroke="#F4C0D1" stroke-width="0.8"/>
  <text x="572" y="354" font-size="12" font-weight="600" fill="#72243E">🔐 Google OAuth</text>
  <text x="692" y="354" font-size="10" fill="#993556">소셜 로그인</text>

  <rect x="550" y="378" width="270" height="38" rx="6" fill="#fff" stroke="#F4C0D1" stroke-width="0.8"/>
  <text x="572" y="402" font-size="12" font-weight="600" fill="#72243E">📦 ghcr.io</text>
  <text x="652" y="402" font-size="10" fill="#993556">Docker 이미지 레지스트리</text>

  <rect x="550" y="426" width="270" height="38" rx="6" fill="#fff" stroke="#F4C0D1" stroke-width="0.8"/>
  <text x="572" y="450" font-size="12" font-weight="600" fill="#72243E">💬 Discord</text>
  <text x="652" y="450" font-size="10" fill="#993556">웹훅 이벤트 알림</text>

  <!-- Arrows: Backend → External (dashed) -->
  <path d="M250 422 L250 301 L548 301" fill="none" stroke="#D4537E" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#a)"/>
  <path d="M250 422 L490 422 L490 349 L548 349" fill="none" stroke="#D4537E" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#a)"/>
  <path d="M250 480 L510 480 L510 445 L548 445" fill="none" stroke="#D4537E" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#a)"/>

