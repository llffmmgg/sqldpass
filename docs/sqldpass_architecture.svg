  <line x1="80" y1="688" x2="104" y2="688" stroke="#374151" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="110" y="692" font-size="10" fill="#6b7280">Data flow</text>
  <line x1="190" y1="688" x2="214" y2="688" stroke="#D4537E" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#a)"/>
