  <text x="108" y="464" font-size="10" fill="#185FA5">:8080 · REST API</text>

  <rect x="270" y="422" width="120" height="60" rx="8" fill="#fff" stroke="#B5D4F4" stroke-width="0.8" filter="url(#shadow)"/>
  <text x="292" y="446" font-size="13" font-weight="600" fill="#0C447C">🗄 MySQL 8</text>
  <text x="292" y="464" font-size="10" fill="#185FA5">데이터 저장소</text>

  <rect x="410" y="432" width="54" height="32" rx="6" fill="#fff" stroke="#B5D4F4" stroke-width="0.8"/>
  <text x="420" y="453" font-size="10" fill="#185FA5">📋 P</text>

  <!-- Arrow: Backend → MySQL -->
  <line x1="250" y1="452" x2="268" y2="452" stroke="#378ADD" stroke-width="1.2" marker-end="url(#a)"/>

