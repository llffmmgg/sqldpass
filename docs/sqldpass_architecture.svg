  <rect x="530" y="530" width="310" height="66" rx="12" fill="#F2F8EA" stroke="#C0DD97" stroke-width="1"/>
  <text x="546" y="548" font-size="10" font-weight="600" fill="#3B6D11" letter-spacing="0.5">CI/CD</text>
  <rect x="550" y="558" width="270" height="30" rx="6" fill="#fff" stroke="#C0DD97" stroke-width="0.8"/>
  <text x="572" y="578" font-size="12" font-weight="600" fill="#27500A">🔄 GitHub Actions</text>
