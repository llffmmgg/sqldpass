  <line x1="310" y1="688" x2="334" y2="688" stroke="#639922" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#a)"/>
  <text x="340" y="692" font-size="10" fill="#6b7280">CI/CD</text>
  <line x1="400" y1="688" x2="424" y2="688" stroke="#D85A30" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#a)"/>
  <text x="430" y="692" font-size="10" fill="#6b7280">Logs</text>
