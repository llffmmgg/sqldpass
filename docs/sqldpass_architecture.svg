  <line x1="190" y1="590" x2="208" y2="590" stroke="#D85A30" stroke-width="1.2" marker-end="url(#a)"/>
  <!-- Arrow: nginx → Grafana -->
  <line x1="340" y1="590" x2="322" y2="590" stroke="#D85A30" stroke-width="1.2" marker-end="url(#a)"/>

