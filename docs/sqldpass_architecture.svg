  <rect x="310" y="156" width="260" height="30" rx="6" fill="#fff" stroke="#CECBF6" stroke-width="0.8"/>
  <text x="340" y="176" font-size="12" font-weight="600" fill="#534AB7">▲  Next.js</text>
  <text x="460" y="176" font-size="10" fill="#7F77DD">www.sqldpass.com</text>

  <!-- Arrow: Frontend → Nginx -->
  <path d="M360 192 L360 216 L230 216 L230 248" fill="none" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="240" y="214" font-size="10" fill="#1D9E75" font-weight="500">rewrites</text>

  <!-- ===== OCI NGINX ===== -->
  <rect x="60" y="250" width="340" height="110" rx="12" fill="#EFFAF5" stroke="#5DCAA5" stroke-width="1"/>
  <text x="76" y="268" font-size="10" font-weight="600" fill="#0F6E56" letter-spacing="0.5">OCI — E2.1.MICRO #1</text>

  <rect x="80" y="280" width="180" height="60" rx="8" fill="#fff" stroke="#9FE1CB" stroke-width="0.8" filter="url(#shadow)"/>
  <text x="108" y="304" font-size="13" font-weight="600" fill="#085041">⚡ nginx</text>
  <text x="108" y="322" font-size="10" fill="#0F6E56">api.sqldpass.com · HTTPS/443</text>

