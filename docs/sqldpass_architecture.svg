<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 720" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="880" height="720" rx="16" fill="#f8f9fb"/>

  <!-- Title -->
  <text x="440" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">sqldpass.com — Infrastructure Architecture</text>

  <!-- ===== USER ===== -->
  <rect x="340" y="56" width="200" height="42" rx="21" fill="#fff" stroke="#9ca3af" stroke-width="1" filter="url(#shadow)"/>
  <text x="370" y="82" font-size="15">🌐</text>
  <text x="393" y="82" font-size="13" font-weight="600" fill="#374151">사용자 브라우저</text>

  <!-- Arrow: User → Frontend -->
  <line x1="440" y1="98" x2="440" y2="128" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="448" y="118" font-size="10" fill="#7F77DD" font-weight="500">HTTPS</text>

  <!-- ===== VERCEL ===== -->
  <rect x="280" y="130" width="320" height="62" rx="12" fill="#F5F4FE" stroke="#AFA9EC" stroke-width="1"/>
