# ============================================================
# nginx — Grafana HTTPS 리버스 프록시
# ============================================================
# grafana.sqldpass.com → 127.0.0.1:3000 (Grafana 컨테이너)
# nginx는 host network 모드로 동작
# ============================================================

# HTTP → HTTPS 리다이렉트 + certbot 갱신
server {
    listen 80;
    server_name grafana.sqldpass.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Grafana 프록시
server {
    listen 443 ssl;
    http2 on;
    server_name grafana.sqldpass.com;

    ssl_certificate /etc/letsencrypt/live/grafana.sqldpass.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/grafana.sqldpass.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Grafana Live (WebSocket) 지원
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 300s;
    }
}
