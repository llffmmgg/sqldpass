# ============================================================
# sqldpass 백엔드 CD (Continuous Deployment)
# ============================================================
#
# main 브랜치에 push되면 자동으로 배포합니다.
#
# 동작 흐름:
#   1. build-push — Docker 이미지 빌드 → ghcr.io에 푸시
#   2. deploy    — docker-compose.prod.yaml을 서버에 전송
#                  → GitHub Secrets를 환경변수로 전달
#                  → docker compose pull & up
#                  → 헬스체크
#
# 시크릿 관리:
#   - SSH 접속 정보: SSH_HOST, SSH_PORT, SSH_USERNAME, SSH_PRIVATE_KEY
#   - 앱 시크릿: MYSQL_*, JWT_SECRET, *_API_KEY 등
#   - 서버에 .env 파일을 만들지 않음 — 환경변수로 직접 전달
#
# 트리거 조건:
#   - main 브랜치에 push
#   - backend/ 또는 docker-compose.prod.yaml 변경 시
# ============================================================

name: 백엔드 CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'docker-compose.prod.yaml'
      - '.github/workflows/cd.yml'

# ----------------------------------------------------------
# 동시 배포 방지 — frontend CD와 같은 그룹으로 묶어 순차 실행 강제
# 백/프 함께 푸시된 경우에도 race 없이 한 쪽 끝난 뒤 다른 쪽 실행.
# cancel-in-progress: false — 진행 중인 배포를 끊지 않고 큐잉
# ----------------------------------------------------------
concurrency:
  group: deploy-prod
  cancel-in-progress: false

# ----------------------------------------------------------
# 전역 환경변수
# ----------------------------------------------------------
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: llffmmgg/sqldpass

jobs:
  # ----------------------------------------------------------
  # Job 1: Docker 이미지 빌드 및 ghcr.io 푸시
  # - 멀티스테이지 Dockerfile로 최적화된 이미지 생성
  # - 두 가지 태그로 푸시:
  #   - prod   : 항상 최신 운영 버전 (서버에서 pull하는 태그)
  #   - <SHA>  : 커밋별 이미지 (문제 발생 시 롤백용)
  # ----------------------------------------------------------
  build-push:
    name: 이미지 빌드 및 푸시
    # GitHub Actions ARM runner — OCI Ampere(arm64) 와 동일 아키텍처라 native 빌드.
    # QEMU 에뮬레이션 페널티(2~5배) 제거 → apt-get/gradle bootJar/playwright install 모두 단축.
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read       # 소스 코드 읽기 권한
      packages: write      # ghcr.io 패키지 쓰기 권한 (이미지 푸시)

    steps:
      - name: 소스 코드 체크아웃
        uses: actions/checkout@v4

      # Gradle 테스트 실행 (배포 전 최종 검증)
      # CI에서 PR 시 테스트하지만, main 직접 push도 있을 수 있으므로 한 번 더 실행
      - name: Java 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Gradle 캐시 설정
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle*', 'backend/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 테스트 실행
        working-directory: backend
        run: |
          chmod +x gradlew
          ./gradlew test --no-daemon

      # Docker Buildx: 캐시 등 고급 기능 지원 (ARM runner 라 QEMU 불필요)
      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      # ghcr.io 로그인
      # GITHUB_TOKEN은 GitHub Actions가 자동 제공 — 별도 시크릿 등록 불필요
      - name: GitHub Container Registry 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker 이미지 빌드 + ghcr.io에 푸시
      # platforms: OCI ARM 인스턴스(Ampere)용으로 linux/arm64 빌드
      - name: Docker 이미지 빌드 및 푸시
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:prod
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          # GitHub Actions 캐시를 Docker 레이어 캐시로 활용
          # → 변경되지 않은 레이어는 재빌드 건너뜀 (빌드 시간 대폭 단축)
          # mode=min: final layer 만 캐시에 저장 (export 시간 2분+ 절약).
          # apt/gradle/playwright intermediate layer 는 어차피 build.gradle 변경 없으면
          # Docker layer cache 로 재사용되므로 mode=max 와 hit 률 차이 거의 없음.
          cache-from: type=gha
          cache-to: type=gha,mode=min

  # ----------------------------------------------------------
  # Job 2: OCI 서버 배포
  # - docker-compose.prod.yaml을 SCP로 서버에 전송
  # - GitHub Secrets를 셸 환경변수로 전달하여 docker compose 실행
  # - .env 파일을 서버에 만들지 않음 (보안)
  # - 배포 후 헬스체크로 정상 기동 확인
  # ----------------------------------------------------------
  deploy:
    name: 운영 서버 배포
    needs: build-push
    runs-on: ubuntu-latest

    steps:
      # docker-compose.prod.yaml을 서버로 전송하기 위해 체크아웃
      - name: 소스 코드 체크아웃
        uses: actions/checkout@v4

      # docker-compose.prod.yaml을 OCI 서버로 SCP 전송
      # → 서버에 미리 배치할 필요 없이, 코드 변경 시 자동 반영
      - name: Compose 파일 서버 전송
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "docker-compose.prod.yaml"
          target: "~/sqldpass/"

      # SSH로 OCI 서버에 접속하여 배포 실행
      # envs: GitHub Secrets를 셸 환경변수로 서버에 전달
      # → docker compose가 ${MYSQL_USER} 등을 셸 환경변수에서 읽음
      # → .env 파일 없이 시크릿 주입 (배포 끝나면 환경변수 사라짐)
      - name: SSH 배포 실행
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          # 서버로 전달할 환경변수 목록 (GitHub Secrets → 셸 환경변수)
          envs: MYSQL_DATABASE,MYSQL_USER,MYSQL_PASSWORD,MYSQL_ROOT_PASSWORD,JWT_SECRET,ADMIN_USERNAME,ADMIN_PASSWORD_HASH,GOOGLE_OAUTH_CLIENT_ID,GOOGLE_OAUTH_CLIENT_SECRET,GOOGLE_OAUTH_ANDROID_CLIENT_ID,GOOGLE_OAUTH_IOS_CLIENT_ID,PORTONE_STORE_ID,PORTONE_API_SECRET,PORTONE_API_BASE_URL,PAYMENT_REVIEWER_NICKNAMES,PAYMENT_3DAY_AMOUNT,PAYMENT_3DAY_NAME,PAYMENT_1MONTH_AMOUNT,PAYMENT_1MONTH_NAME,PAYMENT_UNLIMITED_AMOUNT,PAYMENT_UNLIMITED_NAME,ANTHROPIC_API_KEY,GOOGLE_GENAI_API_KEY,OPENAI_API_KEY,DISCORD_WEBHOOK_GENERATION,DISCORD_WEBHOOK_SIGNUP,DISCORD_WEBHOOK_ERROR,DISCORD_WEBHOOK_FEEDBACK,DISCORD_WEBHOOK_PAYMENT,R2_ENDPOINT,R2_BUCKET,R2_ACCESS_KEY,R2_SECRET_KEY,R2_PUBLIC_BASE_URL,APP_STORE_BUNDLE_ID,APP_STORE_APP_APPLE_ID,APP_STORE_ENVIRONMENT
          script: |
            # ============================================================
            # 무중단(에 가까운) 배포 — 포트 재바인딩 방식
            # ------------------------------------------------------------
            # 1) 신규 이미지를 임시 컨테이너로 8081 포트에 기동
            # 2) localhost:8081 헬스체크 통과 시에만 8080 스왑 진행
            # 3) 헬스체크 실패 시 기존 8080은 그대로 유지 → 사용자 영향 0
            # 4) 다운타임은 8080 stop → 8080 up 사이 1~3초로 한정
            # ============================================================
            set -e
            cd ~/sqldpass

            NEW_IMAGE="ghcr.io/llffmmgg/sqldpass:prod"
            NEW_NAME="sqldpass-app-new"
            NEW_PORT=8081
            NETWORK="sqldpass_backend-net"

            # === 0) 최신 이미지 pull ===
            echo "최신 이미지를 가져옵니다..."
            docker compose -f docker-compose.prod.yaml pull app

            # === 1) 이전 배포 잔여 임시 컨테이너 정리 ===
            docker rm -f "$NEW_NAME" 2>/dev/null || true

            # === 2) 임시 컨테이너를 8081로 기동 ===
            # compose의 backend-net에 붙여 db 호스트명으로 접근 가능
            # 환경변수는 envs로 받은 값을 그대로 -e 로 주입 (compose의 environment 섹션과 1:1)
            echo "신규 컨테이너를 ${NEW_PORT} 포트에 기동합니다..."
            docker run -d \
              --name "$NEW_NAME" \
              --network "$NETWORK" \
              -p ${NEW_PORT}:8080 \
              --memory=1g \
              --stop-timeout 30 \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e TZ=Asia/Seoul \
              -e DB_URL="jdbc:mysql://db:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul" \
              -e DB_USERNAME="${MYSQL_USER}" \
              -e DB_PASSWORD="${MYSQL_PASSWORD}" \
              -e JWT_SECRET="${JWT_SECRET}" \
              -e GOOGLE_OAUTH_CLIENT_ID="${GOOGLE_OAUTH_CLIENT_ID}" \
              -e GOOGLE_OAUTH_CLIENT_SECRET="${GOOGLE_OAUTH_CLIENT_SECRET}" \
              -e GOOGLE_OAUTH_ANDROID_CLIENT_ID="${GOOGLE_OAUTH_ANDROID_CLIENT_ID}" \
              -e GOOGLE_OAUTH_IOS_CLIENT_ID="${GOOGLE_OAUTH_IOS_CLIENT_ID}" \
              -e PORTONE_STORE_ID="${PORTONE_STORE_ID}" \
              -e PORTONE_API_SECRET="${PORTONE_API_SECRET}" \
              -e PORTONE_API_BASE_URL="${PORTONE_API_BASE_URL:-https://api.portone.io}" \
              -e PAYMENT_REVIEWER_NICKNAMES="${PAYMENT_REVIEWER_NICKNAMES}" \
              -e PAYMENT_3DAY_AMOUNT="${PAYMENT_3DAY_AMOUNT:-3900}" \
              -e PAYMENT_3DAY_NAME="${PAYMENT_3DAY_NAME:-문어CBT 3일 이용권}" \
              -e PAYMENT_1MONTH_AMOUNT="${PAYMENT_1MONTH_AMOUNT:-9900}" \
              -e PAYMENT_1MONTH_NAME="${PAYMENT_1MONTH_NAME:-문어CBT 한달 이용권}" \
              -e PAYMENT_UNLIMITED_AMOUNT="${PAYMENT_UNLIMITED_AMOUNT:-29900}" \
              -e PAYMENT_UNLIMITED_NAME="${PAYMENT_UNLIMITED_NAME:-문어CBT All Pass}" \
              -e ADMIN_USERNAME="${ADMIN_USERNAME}" \
              -e ADMIN_PASSWORD_HASH="${ADMIN_PASSWORD_HASH}" \
              -e ANTHROPIC_API_KEY="${ANTHROPIC_API_KEY}" \
              -e GOOGLE_GENAI_API_KEY="${GOOGLE_GENAI_API_KEY}" \
              -e OPENAI_API_KEY="${OPENAI_API_KEY}" \
              -e DISCORD_WEBHOOK_GENERATION="${DISCORD_WEBHOOK_GENERATION}" \
              -e DISCORD_WEBHOOK_SIGNUP="${DISCORD_WEBHOOK_SIGNUP}" \
              -e DISCORD_WEBHOOK_ERROR="${DISCORD_WEBHOOK_ERROR}" \
              -e DISCORD_WEBHOOK_FEEDBACK="${DISCORD_WEBHOOK_FEEDBACK}" \
              -e DISCORD_WEBHOOK_PAYMENT="${DISCORD_WEBHOOK_PAYMENT}" \
              -e R2_ENDPOINT="${R2_ENDPOINT}" \
              -e R2_BUCKET="${R2_BUCKET}" \
              -e R2_ACCESS_KEY="${R2_ACCESS_KEY}" \
              -e R2_SECRET_KEY="${R2_SECRET_KEY}" \
              -e R2_PUBLIC_BASE_URL="${R2_PUBLIC_BASE_URL}" \
              -e PDF_PRINT_PAGE_BASE_URL="https://www.sqldpass.com" \
              -e APP_STORE_BUNDLE_ID="${APP_STORE_BUNDLE_ID:-com.sqldpass.app}" \
              -e APP_STORE_APP_APPLE_ID="${APP_STORE_APP_APPLE_ID}" \
              -e APP_STORE_ENVIRONMENT="${APP_STORE_ENVIRONMENT:-PRODUCTION}" \
              "$NEW_IMAGE"

            # === 3) 신규 컨테이너 헬스체크 (최대 90초) ===
            echo "신규 컨테이너 헬스체크 대기..."
            HEALTHY=0
            for i in $(seq 1 18); do
              if curl -sf http://localhost:${NEW_PORT}/actuator/health > /dev/null 2>&1; then
                HEALTHY=1
                echo "신규 컨테이너 헬스체크 통과 ($i회차)"
                break
              fi
              echo "  대기 중... ($i/18)"
              sleep 5
            done

            if [ "$HEALTHY" != "1" ]; then
              echo "❌ 신규 컨테이너 헬스체크 실패. 기존 8080은 그대로 유지됩니다."
              echo "--- 신규 컨테이너 로그 (마지막 100줄) ---"
              docker logs --tail 100 "$NEW_NAME" || true
              docker rm -f "$NEW_NAME" || true
              exit 1
            fi

            # === 4) 8080 스왑 (다운타임 최소화 구간 1~3초) ===
            # graceful shutdown으로 인플라이트 요청 마무리됨 (application-prod.yaml + stop_grace_period:30s)
            echo "기존 8080 컨테이너 중지..."
            docker compose -f docker-compose.prod.yaml stop app
            docker compose -f docker-compose.prod.yaml rm -f app

            echo "임시 컨테이너 제거..."
            docker rm -f "$NEW_NAME"

            echo "정식 컨테이너를 8080으로 기동..."
            docker compose -f docker-compose.prod.yaml up -d app

            # === 5) 최종 헬스체크 ===
            echo "최종 8080 헬스체크 대기..."
            for i in $(seq 1 18); do
              if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
                echo "✅ 배포 완료! 애플리케이션이 정상 작동 중입니다."
                docker image prune -f
                exit 0
              fi
              echo "  대기 중... ($i/18)"
              sleep 5
            done

            echo "❌ 최종 헬스체크 실패. 로그 확인: docker compose -f docker-compose.prod.yaml logs app"
            docker compose -f docker-compose.prod.yaml logs --tail 100 app
            exit 1
        env:
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_ANDROID_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          GOOGLE_OAUTH_IOS_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_IOS_CLIENT_ID }}
          PORTONE_STORE_ID: ${{ secrets.PORTONE_STORE_ID }}
          PORTONE_API_SECRET: ${{ secrets.PORTONE_API_SECRET }}
          PORTONE_API_BASE_URL: ${{ secrets.PORTONE_API_BASE_URL }}
          PAYMENT_REVIEWER_NICKNAMES: ${{ secrets.PAYMENT_REVIEWER_NICKNAMES }}
          PAYMENT_3DAY_AMOUNT: ${{ secrets.PAYMENT_3DAY_AMOUNT }}
          PAYMENT_3DAY_NAME: ${{ secrets.PAYMENT_3DAY_NAME }}
          PAYMENT_1MONTH_AMOUNT: ${{ secrets.PAYMENT_1MONTH_AMOUNT }}
          PAYMENT_1MONTH_NAME: ${{ secrets.PAYMENT_1MONTH_NAME }}
          PAYMENT_UNLIMITED_AMOUNT: ${{ secrets.PAYMENT_UNLIMITED_AMOUNT }}
          PAYMENT_UNLIMITED_NAME: ${{ secrets.PAYMENT_UNLIMITED_NAME }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_GENAI_API_KEY: ${{ secrets.GOOGLE_GENAI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DISCORD_WEBHOOK_GENERATION: ${{ secrets.DISCORD_WEBHOOK_GENERATION }}
          DISCORD_WEBHOOK_SIGNUP: ${{ secrets.DISCORD_WEBHOOK_SIGNUP }}
          DISCORD_WEBHOOK_ERROR: ${{ secrets.DISCORD_WEBHOOK_ERROR }}
          DISCORD_WEBHOOK_FEEDBACK: ${{ secrets.DISCORD_WEBHOOK_FEEDBACK }}
          DISCORD_WEBHOOK_PAYMENT: ${{ secrets.DISCORD_WEBHOOK_PAYMENT }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          APP_STORE_BUNDLE_ID: ${{ secrets.APP_STORE_BUNDLE_ID }}
          APP_STORE_APP_APPLE_ID: ${{ secrets.APP_STORE_APP_APPLE_ID }}
          APP_STORE_ENVIRONMENT: ${{ secrets.APP_STORE_ENVIRONMENT }}
