# ============================================================
# sqldpass 백엔드 CD (Continuous Deployment)
# ============================================================
#
# main 브랜치에 push되면 자동으로 배포합니다.
#
# 동작 흐름:
#   1. build-push — Docker 이미지 빌드 → ghcr.io에 푸시
#   2. deploy    — docker-compose.prod.yaml을 서버에 전송
#                  → GitHub Secrets를 환경변수로 전달
#                  → docker compose pull & up
#                  → 헬스체크
#
# 시크릿 관리:
#   - SSH 접속 정보: SSH_HOST, SSH_PORT, SSH_USERNAME, SSH_PRIVATE_KEY
#   - 앱 시크릿: MYSQL_*, JWT_SECRET, *_API_KEY 등
#   - 서버에 .env 파일을 만들지 않음 — 환경변수로 직접 전달
#
# 트리거 조건:
#   - main 브랜치에 push
#   - backend/ 또는 docker-compose.prod.yaml 변경 시
# ============================================================

name: 백엔드 CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'docker-compose.prod.yaml'

# ----------------------------------------------------------
# 전역 환경변수
# ----------------------------------------------------------
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: llffmmgg/sqldpass

jobs:
  # ----------------------------------------------------------
  # Job 1: Docker 이미지 빌드 및 ghcr.io 푸시
  # - 멀티스테이지 Dockerfile로 최적화된 이미지 생성
  # - 두 가지 태그로 푸시:
  #   - prod   : 항상 최신 운영 버전 (서버에서 pull하는 태그)
  #   - <SHA>  : 커밋별 이미지 (문제 발생 시 롤백용)
  # ----------------------------------------------------------
  build-push:
    name: 이미지 빌드 및 푸시
    runs-on: ubuntu-latest
    permissions:
      contents: read       # 소스 코드 읽기 권한
      packages: write      # ghcr.io 패키지 쓰기 권한 (이미지 푸시)

    steps:
      - name: 소스 코드 체크아웃
        uses: actions/checkout@v4

      # Gradle 테스트 실행 (배포 전 최종 검증)
      # CI에서 PR 시 테스트하지만, main 직접 push도 있을 수 있으므로 한 번 더 실행
      - name: Java 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Gradle 캐시 설정
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle*', 'backend/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 테스트 실행
        working-directory: backend
        run: |
          chmod +x gradlew
          ./gradlew test --no-daemon

      # QEMU: ARM64 크로스 빌드를 위한 에뮬레이션 설정
      # ubuntu-latest는 amd64인데 OCI 서버는 arm64이므로 필요
      - name: QEMU 설정
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      # Docker Buildx: 멀티플랫폼 빌드, 캐시 등 고급 기능 지원
      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      # ghcr.io 로그인
      # GITHUB_TOKEN은 GitHub Actions가 자동 제공 — 별도 시크릿 등록 불필요
      - name: GitHub Container Registry 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker 이미지 빌드 + ghcr.io에 푸시
      # platforms: OCI ARM 인스턴스(Ampere)용으로 linux/arm64 빌드
      - name: Docker 이미지 빌드 및 푸시
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:prod
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          # GitHub Actions 캐시를 Docker 레이어 캐시로 활용
          # → 변경되지 않은 레이어는 재빌드 건너뜀 (빌드 시간 대폭 단축)
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ----------------------------------------------------------
  # Job 2: OCI 서버 배포
  # - docker-compose.prod.yaml을 SCP로 서버에 전송
  # - GitHub Secrets를 셸 환경변수로 전달하여 docker compose 실행
  # - .env 파일을 서버에 만들지 않음 (보안)
  # - 배포 후 헬스체크로 정상 기동 확인
  # ----------------------------------------------------------
  deploy:
    name: 운영 서버 배포
    needs: build-push
    runs-on: ubuntu-latest

    steps:
      # docker-compose.prod.yaml을 서버로 전송하기 위해 체크아웃
      - name: 소스 코드 체크아웃
        uses: actions/checkout@v4

      # docker-compose.prod.yaml을 OCI 서버로 SCP 전송
      # → 서버에 미리 배치할 필요 없이, 코드 변경 시 자동 반영
      - name: Compose 파일 서버 전송
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "docker-compose.prod.yaml"
          target: "~/sqldpass/"

      # SSH로 OCI 서버에 접속하여 배포 실행
      # envs: GitHub Secrets를 셸 환경변수로 서버에 전달
      # → docker compose가 ${MYSQL_USER} 등을 셸 환경변수에서 읽음
      # → .env 파일 없이 시크릿 주입 (배포 끝나면 환경변수 사라짐)
      - name: SSH 배포 실행
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          # 서버로 전달할 환경변수 목록 (GitHub Secrets → 셸 환경변수)
          envs: MYSQL_DATABASE,MYSQL_USER,MYSQL_PASSWORD,MYSQL_ROOT_PASSWORD,JWT_SECRET,ADMIN_USERNAME,ADMIN_PASSWORD_HASH,GOOGLE_OAUTH_CLIENT_ID,GOOGLE_OAUTH_CLIENT_SECRET,ANTHROPIC_API_KEY,GOOGLE_GENAI_API_KEY,OPENAI_API_KEY
          script: |
            # === 프로젝트 디렉토리로 이동 ===
            cd ~/sqldpass

            # === 최신 이미지 가져오기 ===
            # ghcr.io에서 :prod 태그의 최신 이미지를 pull
            echo "최신 이미지를 가져옵니다..."
            docker compose -f docker-compose.prod.yaml pull app

            # === 컨테이너 재시작 ===
            # up -d: 변경된 이미지가 있는 서비스만 재생성
            # DB 컨테이너는 이미지가 동일하면 재시작하지 않음
            echo "컨테이너를 재시작합니다..."
            docker compose -f docker-compose.prod.yaml up -d

            # === 사용하지 않는 이미지 정리 ===
            echo "사용하지 않는 이미지를 정리합니다..."
            docker image prune -f

            # === 헬스체크 ===
            # 애플리케이션이 정상 기동될 때까지 최대 60초 대기
            echo "애플리케이션 시작을 확인합니다..."
            for i in $(seq 1 12); do
              if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
                echo "배포 완료! 애플리케이션이 정상 작동 중입니다."
                exit 0
              fi
              echo "  대기 중... ($i/12)"
              sleep 5
            done

            # 60초 내 응답이 없으면 배포 실패로 처리
            echo "헬스체크 실패. 로그 확인: docker compose -f docker-compose.prod.yaml logs app"
            exit 1
        env:
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_GENAI_API_KEY: ${{ secrets.GOOGLE_GENAI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
