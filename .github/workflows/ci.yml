# ============================================================
# sqldpass 백엔드 CI (Continuous Integration)
# ============================================================
#
# PR이 main 브랜치로 올라올 때 자동으로 테스트를 실행합니다.
# 테스트 실패 시 PR merge가 차단됩니다.
# (Settings > Branches > Branch protection rules에서 설정 필요)
#
# 트리거 조건:
#   - main 브랜치 대상 PR 생성/업데이트
#   - backend/ 디렉토리 내 파일이 변경된 경우에만
# ============================================================

name: 백엔드 CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  test:
    name: 테스트
    runs-on: ubuntu-latest
    timeout-minutes: 5          # 5분 초과 시 자동 취소 (무한 대기 방지)
    defaults:
      run:
        working-directory: backend

    steps:
      # 소스 코드를 Actions 러너에 체크아웃
      - name: 소스 코드 체크아웃
        uses: actions/checkout@v4

      # Java 21 (Temurin 배포판) 설치
      - name: Java 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Gradle 의존성 캐시 — 매번 다운로드하지 않고 캐시에서 복원
      # 캐시 키: build.gradle, gradle-wrapper.properties 해시값 기반
      - name: Gradle 캐시 설정
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('backend/**/*.gradle*', 'backend/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # gradlew 실행 권한 부여 (Git에서 실행 권한이 보존되지 않을 수 있음)
      - name: Gradle 실행 권한 부여
        run: chmod +x gradlew

      # 전체 테스트 실행 (H2 인메모리 DB 사용, 외부 DB 불필요)
      # --no-daemon: CI 환경에서는 Gradle 데몬 불필요
      - name: 테스트 실행
        run: ./gradlew test --no-daemon
