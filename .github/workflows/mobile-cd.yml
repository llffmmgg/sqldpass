# ============================================================
# sqldpass 모바일 CD — main push 시 서명된 AAB 빌드 + Play Internal 자동 업로드
# ============================================================
#
# 트리거:
#   - main 브랜치에 mobile/** 변경이 push 되면 자동
#   - workflow_dispatch 로 수동 실행 가능
#
# 사용 GitHub Secrets (모두 필수):
#   - GOOGLE_WEB_CLIENT_ID         : OAuth Web 클라이언트 (앱 안에 박힘)
#   - KEYSTORE_BASE64              : `base64 -w0 release.keystore` 결과
#   - KEYSTORE_PASSWORD            : 키스토어 비밀번호
#   - KEY_ALIAS                    : 키 alias (보통 sqldpass)
#   - KEY_PASSWORD                 : 키 비밀번호
#   - PLAY_PUBLISHER_JSON          : Play Console 서비스 계정 JSON 통째
#
# versionCode = github.run_number 로 자동 증가.
# 트랙은 internal — 사람이 Play Console 에서 비공개/프로덕션 승급.
# ============================================================

name: 모바일 CD

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-cd.yml'
  workflow_dispatch:

jobs:
  release-aab:
    name: bundleRelease + Play Internal 업로드
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: 소스 코드 체크아웃
        uses: actions/checkout@v4

      - name: Java 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Android SDK 설정
        uses: android-actions/setup-android@v3
        with:
          packages: ''

      - name: Gradle 캐시 설정
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-mobile-${{ hashFiles('mobile/**/*.gradle*', 'mobile/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-mobile-

      - name: gradlew 실행 권한 부여
        run: chmod +x gradlew

      - name: 키스토어 base64 디코드
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Play 서비스 계정 JSON 쓰기
        env:
          PLAY_PUBLISHER_JSON: ${{ secrets.PLAY_PUBLISHER_JSON }}
        run: |
          echo "$PLAY_PUBLISHER_JSON" > "$RUNNER_TEMP/play-publisher.json"

      - name: bundleRelease 실행
        env:
          ORG_GRADLE_PROJECT_GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          ORG_GRADLE_PROJECT_VERSION_CODE: ${{ github.run_number }}
          SQLDPASS_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          SQLDPASS_KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          SQLDPASS_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SQLDPASS_KEY_PASS: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:bundleRelease --no-daemon

      - name: Play Internal 트랙 업로드
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_PUBLISHER_JSON }}
          packageName: com.sqldpass.app
          releaseFiles: mobile/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: draft
          mappingFile: mobile/app/build/outputs/mapping/release/mapping.txt

      - name: 산출물 업로드 (디버깅용)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sqldpass-release-${{ github.run_number }}
          path: |
            mobile/app/build/outputs/bundle/release/*.aab
            mobile/app/build/outputs/mapping/release/mapping.txt
          retention-days: 14
          if-no-files-found: ignore
