name: iOS CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-ci.yml'
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-ci.yml'

jobs:
  build:
    name: Simulator build
    runs-on: macos-15
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ios

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Generate Xcode project
        run: bash scripts/bootstrap_ci.sh

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project Sqldpass.xcodeproj -scheme Sqldpass

      - name: Build Debug for simulator
        run: bash scripts/build_debug.sh
