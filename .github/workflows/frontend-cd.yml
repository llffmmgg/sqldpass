# ============================================================
# sqldpass 프론트엔드 CD (Continuous Deployment)
# ============================================================
#
# main 브랜치에 push되면 자동으로 배포합니다.
#
# 동작 흐름:
#   1. build-push — Docker 이미지 빌드 → ghcr.io에 푸시
#   2. deploy    — 서버에 최신 이미지 pull & 롤링 스왑
#                  → 3001 포트에 임시 기동 → 헬스체크 → 3000 스왑
#                  → 실패 시 기존 3000은 그대로 유지
#
# 시크릿:
#   - SSH_HOST, SSH_PORT, SSH_USERNAME, SSH_PRIVATE_KEY (백엔드와 공유)
#   - NEXT_PUBLIC_GOOGLE_CLIENT_ID — OAuth 로그인용 클라이언트 ID (공개값이지만
#     secret으로 관리해서 값 변경·회전 편의성 확보). 빌드 시 --build-arg로 주입.
#   - 런타임 env(INTERNAL_API_URL 등)는 compose에 하드코딩
#
# 트리거:
#   - main 브랜치 push
#   - frontend/ 또는 docker-compose.prod.yaml 또는 이 워크플로 변경 시
# ============================================================

name: 프론트엔드 CD

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'docker-compose.prod.yaml'
      - '.github/workflows/frontend-cd.yml'

# 백엔드 CD와 같은 group으로 묶어 순차 배포 (race 방지)
concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: llffmmgg/sqldpass-web

jobs:
  # ----------------------------------------------------------
  # Job 1: Docker 이미지 빌드 및 ghcr.io 푸시
  # - Dockerfile이 3-stage (deps, builder, runner)로 내부에서 npm ci + next build 수행
  # - BUILDPLATFORM에서 cross-compile → ARM 에뮬레이션 회피 (deps/builder 단계)
  # - 최종 runner stage만 linux/arm64로 빌드
  # ----------------------------------------------------------
  build-push:
    name: 이미지 빌드 및 푸시
    # GitHub Actions ARM runner — OCI Ampere(arm64) 와 동일 아키텍처라 native 빌드.
    # npm ci + next build 가 에뮬레이션 없이 돌아 2배 가까이 빠름.
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: 소스 코드 체크아웃
        uses: actions/checkout@v4

      # Docker Buildx: 캐시 등 고급 기능 지원 (ARM runner 라 QEMU 불필요)
      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: GitHub Container Registry 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker 이미지 빌드 + ghcr.io 푸시
      # platforms: OCI Ampere ARM 인스턴스용 arm64
      # build-args: NEXT_PUBLIC_* 는 빌드 타임에 클라이언트 번들 inline되므로
      #             ARG로 전달해야 함 (런타임 env는 너무 늦음)
      - name: Docker 이미지 빌드 및 푸시
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          platforms: linux/arm64
          build-args: |
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
            NEXT_PUBLIC_PORTONE_STORE_ID=${{ secrets.NEXT_PUBLIC_PORTONE_STORE_ID }}
            NEXT_PUBLIC_PORTONE_CHANNEL_KEY=${{ secrets.NEXT_PUBLIC_PORTONE_CHANNEL_KEY }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:prod
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          # GitHub Actions 캐시 활용 → 의존성 변경 없으면 레이어 재사용
          # mode=min: final layer 만 캐시에 저장 (export 시간 단축, hit 률 영향 미미)
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=min,scope=frontend

  # ----------------------------------------------------------
  # Job 2: OCI 서버 배포 (롤링 스왑 — docker run 방식)
  # - compose 전체 재평가를 피하고 web 컨테이너만 격리 배포
  # - app/db 서비스는 절대 건드리지 않음 (compose 호출 X)
  # - 3001에 임시 컨테이너 기동 → 헬스체크 → 3000 스왑
  # - 실패 시 기존 3000은 그대로 유지 (사용자 영향 0)
  #
  # 역사: 초기엔 `docker compose up -d web` 썼으나, compose가 app 서비스의
  # ${MYSQL_PASSWORD} 등 env 참조를 빈 값으로 재평가해 app 컨테이너를 비밀번호
  # 없이 재생성시키는 사고 발생 (2026-04-18). docker run으로 전환해 완전 격리.
  # ----------------------------------------------------------
  deploy:
    name: 운영 서버 배포
    needs: build-push
    runs-on: ubuntu-latest

    steps:
      - name: SSH 배포 실행
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # ============================================================
            # 프론트엔드 배포 — docker run 기반 롤링 스왑
            # ------------------------------------------------------------
            # docker compose를 일절 호출하지 않음 → app/db env 재평가 트리거 없음.
            # compose 네트워크(sqldpass_backend-net)에만 붙여서 내부 DNS(app, db) 사용.
            # web 컨테이너는 compose의 web 서비스 정의와 동일한 파라미터로 기동.
            # ============================================================
            set -e

            NEW_IMAGE="ghcr.io/llffmmgg/sqldpass-web:prod"
            NEW_NAME="sqldpass-web-new"
            CUR_NAME="sqldpass-web"
            NEW_PORT=3001
            CUR_PORT=3000
            NETWORK="sqldpass_backend-net"

            # === 0) 최신 이미지 pull (compose 거치지 않음) ===
            echo "최신 이미지를 가져옵니다..."
            docker pull "$NEW_IMAGE"

            # === 1) 이전 배포 잔여 임시 컨테이너 정리 ===
            docker rm -f "$NEW_NAME" 2>/dev/null || true

            # === 2) 임시 컨테이너 3001 기동 ===
            echo "신규 컨테이너를 ${NEW_PORT} 포트에 기동합니다..."
            docker run -d \
              --name "$NEW_NAME" \
              --network "$NETWORK" \
              -p ${NEW_PORT}:3000 \
              --memory=700m \
              --stop-timeout 10 \
              -e NODE_ENV=production \
              -e INTERNAL_API_URL=http://app:8080 \
              -e NEXT_PUBLIC_API_URL="" \
              "$NEW_IMAGE"

            # === 3) 헬스체크 (최대 60초) ===
            echo "신규 컨테이너 헬스체크 대기..."
            HEALTHY=0
            for i in $(seq 1 12); do
              if curl -sf -o /dev/null http://localhost:${NEW_PORT}/ ; then
                HEALTHY=1
                echo "신규 컨테이너 헬스체크 통과 ($i회차)"
                break
              fi
              echo "  대기 중... ($i/12)"
              sleep 5
            done

            if [ "$HEALTHY" != "1" ]; then
              echo "❌ 신규 컨테이너 헬스체크 실패. 기존 3000은 그대로 유지됩니다."
              echo "--- 신규 컨테이너 로그 (마지막 100줄) ---"
              docker logs --tail 100 "$NEW_NAME" || true
              docker rm -f "$NEW_NAME" || true
              exit 1
            fi

            # === 4) 3000 스왑 (다운타임 1~3초) ===
            echo "기존 3000 컨테이너 제거..."
            docker rm -f "$CUR_NAME" 2>/dev/null || true

            echo "임시 컨테이너 제거..."
            docker rm -f "$NEW_NAME"

            echo "정식 컨테이너를 ${CUR_PORT} 포트로 기동..."
            docker run -d \
              --name "$CUR_NAME" \
              --network "$NETWORK" \
              -p ${CUR_PORT}:3000 \
              --memory=700m \
              --stop-timeout 10 \
              --restart unless-stopped \
              -e NODE_ENV=production \
              -e INTERNAL_API_URL=http://app:8080 \
              -e NEXT_PUBLIC_API_URL="" \
              "$NEW_IMAGE"

            # === 5) 최종 헬스체크 ===
            echo "최종 ${CUR_PORT} 헬스체크 대기..."
            for i in $(seq 1 12); do
              if curl -sf -o /dev/null http://localhost:${CUR_PORT}/ ; then
                echo "✅ 프론트엔드 배포 완료!"
                docker image prune -f
                exit 0
              fi
              echo "  대기 중... ($i/12)"
              sleep 5
            done

            echo "❌ 최종 헬스체크 실패."
            docker logs --tail 100 "$CUR_NAME" || true
            exit 1
